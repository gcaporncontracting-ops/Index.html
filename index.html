<!DOCTYPE html>
<html lang="en">
<head>

<style>
  :root{
    --ink:#1C2833;
    --ink-2:#243342;
    --paper:#F5F1E6;
    --paper-2:#EDE6D3;
    --line:#C9BE9F;
    --yellow:#F2B705;
    --green:#2F6F5E;
    --rust:#B33A3A;
    --steel:#5C6B73;
    --text-on-ink:#F5F1E6;
    --text-dim:#93A1AB;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:520px;
    min-height:100vh;
    background:var(--ink);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .display{font-family:'Archivo Black',sans-serif; letter-spacing:0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* Header */
  header.topbar{
    padding:18px 18px 14px;
    background:var(--ink);
    border-bottom:1px solid #34434F;
    position:sticky; top:0; z-index:20;
  }
  header.topbar .brand{
    color:var(--text-on-ink);
    font-size:19px;
    text-transform:uppercase;
    line-height:1.15;
  }
  header.topbar .brand span{color:var(--yellow);}
  header.topbar .sub{
    color:var(--text-dim);
    font-size:11px;
    margin-top:3px;
    text-transform:uppercase;
    letter-spacing:0.12em;
  }

  main{
    flex:1;
    background:var(--paper);
    padding:16px 14px 100px;
    overflow-y:auto;
  }

  /* Bottom nav */
  nav.tabbar{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:520px;
    background:var(--ink);
    border-top:1px solid #34434F;
    display:flex;
    z-index:30;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    flex:1;
    background:none;
    border:none;
    color:var(--text-dim);
    font-family:'Inter',sans-serif;
    font-size:10.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.04em;
    padding:10px 2px 9px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    cursor:pointer;
  }
  nav.tabbar button svg{width:20px;height:20px;stroke:var(--text-dim); fill:none;}
  nav.tabbar button.active{color:var(--yellow);}
  nav.tabbar button.active svg{stroke:var(--yellow);}

  /* Section heading */
  .section-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin:2px 2px 12px;
  }
  .section-head h1{
    font-size:20px; margin:0; text-transform:uppercase;
  }
  .section-head .count{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--steel);
  }

  /* Stat grid */
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;}
  .stat-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:3px;
    padding:12px 13px;
    position:relative;
  }
  .stat-card .label{font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--steel); font-weight:600;}
  .stat-card .value{font-family:'IBM Plex Mono',monospace; font-size:21px; font-weight:600; margin-top:4px; color:var(--ink);}
  .stat-card.accent-green .value{color:var(--green);}
  .stat-card.accent-rust .value{color:var(--rust);}

  /* Quick actions */
  .quick-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;}
  .qa-btn{
    background:var(--ink);
    color:var(--text-on-ink);
    border:none;
    border-radius:3px;
    padding:14px 10px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:0.02em;
    display:flex; align-items:center; gap:8px;
    cursor:pointer;
  }
  .qa-btn svg{width:16px;height:16px;stroke:var(--yellow); fill:none; flex-shrink:0;}

  /* Docket card (job) */
  .docket{
    background:#fff;
    border:1px solid var(--line);
    border-radius:2px;
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
  }
  .docket .perf{
    height:0;
    border-top:2px dashed var(--line);
    margin:0 14px;
  }
  .docket-top{
    padding:13px 14px 11px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .docket-no{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    background:var(--ink);
    color:var(--yellow);
    padding:3px 7px;
    border-radius:2px;
    display:inline-block;
  }
  .docket-client{font-weight:700; font-size:14.5px; margin-top:7px;}
  .docket-desc{font-size:12.5px; color:var(--steel); margin-top:2px; line-height:1.35;}
  .stamp{

    font-size:10.5px;
    text-transform:uppercase;
    padding:5px 9px;
    border:2.5px solid;
    border-radius:4px;
    transform:rotate(-6deg);
    white-space:nowrap;
    flex-shrink:0;
    margin-top:2px;
  }
  .stamp.st-progress{color:var(--yellow); border-color:var(--yellow);}
  .stamp.st-completed{color:var(--green); border-color:var(--green);}
  .stamp.st-hold{color:var(--steel); border-color:var(--steel);}
  .stamp.st-notstarted{color:var(--rust); border-color:var(--rust);}

  .docket-stats{
    display:grid; grid-template-columns:repeat(3,1fr);
    padding:10px 14px 13px;
    gap:6px;
  }
  .docket-stats div{font-size:10px; text-transform:uppercase; color:var(--steel); font-weight:600;}
  .docket-stats .v{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink); display:block; margin-top:2px; font-weight:600;}
  .docket-stats .v.neg{color:var(--rust);}
  .docket-stats .v.pos{color:var(--green);}

  .docket-foot{
    display:flex; border-top:1px solid var(--paper-2);
  }
  .docket-foot button{
    flex:1; background:none; border:none; padding:10px 6px;
    font-size:11px; font-weight:700; text-transform:uppercase; color:var(--ink-2);
    border-right:1px solid var(--paper-2); cursor:pointer;
  }
  .docket-foot button:last-child{border-right:none;}

  .job-detail{padding:0 14px 14px; border-top:1px solid var(--paper-2);}
  .job-detail h3{font-size:11px; text-transform:uppercase; color:var(--steel); margin:12px 0 6px;}
  .mini-row{display:flex; justify-content:space-between; font-size:12.5px; padding:5px 0; border-bottom:1px dotted var(--line);}
  .mini-row .amt{font-family:'IBM Plex Mono',monospace; font-weight:600;}
  .status-select{
    margin-top:10px; width:100%; padding:9px; border:1px solid var(--line); border-radius:3px;
    font-family:'Inter'; font-size:13px; background:#fff;

  .form-card h2{font-size:14px; text-transform:uppercase; margin:0 0 12px;}

  label:first-of-type{margin-top:0;}
  input, select, textarea{

    font-family:'Inter',sans-serif; font-size:14.5px; background:#FBF9F3; color:var(--ink);

  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .submit-btn{
    margin-top:16px; width:100%; padding:13px; background:var(--ink); color:var(--yellow);

  }
  .helper-calc{font-size:11.5px; color:var(--steel); margin-top:5px; font-family:'IBM Plex Mono',monospace;}

  /* List rows (expenses/time/invoices) */
  .list-row{
    background:#fff; border:1px solid var(--line); border-radius:3px; padding:11px 13px; margin-bottom:8px;
    display:flex; justify-content:space-between; gap:10px; align-items:center;
  }
  .list-row .left{min-width:0;}
  .list-row .title{font-weight:700; font-size:13.5px;}
  .list-row .meta{font-size:11px; color:var(--steel); margin-top:2px;}
  .list-row .right{text-align:right; flex-shrink:0;}
  .list-row .amt{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px;}
  .list-row .del{background:none;border:none;color:var(--rust);font-size:11px;font-weight:700;cursor:pointer;padding:4px 0 0; text-transform:uppercase;}
  .badge-small{font-size:9px; font-weight:700; text-transform:uppercase; padding:2px 6px; border-radius:10px; display:inline-block; margin-left:6px;}
  .badge-paid{background:#E4EFEA; color:var(--green);}
  .badge-outstanding{background:#F7E5E3; color:var(--rust);}

  .empty-state{
    text-align:center; padding:40px 20px; color:var(--steel);
  }
  .empty-state .display{font-size:15px; color:var(--ink); margin-bottom:6px;}

  .fab-add{
    display:block; width:100%; padding:12px; margin-bottom:16px;
    background:var(--yellow); color:var(--ink); border:none; border-radius:3px;
    font-weight:700; text-transform:uppercase; font-size:13px; cursor:pointer;
  }

  .rate-box{
    background:#fff; border:1px solid var(--line); border-radius:3px; padding:12px 14px;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
  }
  .rate-box label{margin:0; font-size:11px;}
  .rate-box input{width:90px; padding:6px 8px; text-align:right; font-family:'IBM Plex Mono',monospace;}

  .toast{
    position:fixed; bottom:76px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--yellow); padding:10px 18px; border-radius:20px;
    font-size:12.5px; font-weight:700; z-index:50; box-shadow:0 4px 14px rgba(0,0,0,0.3);
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .toast.show{opacity:1;}

  ::-webkit-scrollbar{width:0;}

  .invoice-detail{background:#fff;border:1px solid var(--line);border-radius:3px;padding:18px;margin-bottom:14px;}
  .invoice-detail .inv-head{display:flex;justify-content:space-between;border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:12px;}
  .invoice-detail .inv-head .no{font-family:'IBM Plex Mono';font-weight:600;}
  .invoice-line{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;}
  .invoice-total{display:flex;justify-content:space-between;font-weight:700;font-size:15px;border-top:1px solid var(--line);padding-top:8px;margin-top:6px;}
</style>

<script>
/* ---------------- ICONS ---------------- */

/* ---------------- STATE ---------------- */
let state = {
  rate: 55,
  jobs: [],
  expenses: [],
  time: [],
  invoices: [],
  googleClientId: '',
  driveFolderId: ''
};
let currentTab = 'dashboard';
let storageOk = true;
let expandedJob = null;
let confirmDeleteJobId = null;
let driveAccessToken = null;
let driveConnected = false;
let driveUserEmail = null;

const DRIVE_FOLDER_NAME = 'Invoices 26/27';

const STORAGE_KEY = 'gcaporn-tracker-v1';

function seedData(){

    E(8,6,'2026-07-10','Materials','Mini rollers, cleaner, car care items, glue, masking tape, conduit','Bunnings Bayswater',102.16),

async function loadState(){
  if(typeof window.storage !== 'undefined'){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        state = JSON.parse(res.value);
        storageOk = true;
        return;
      }
    }catch(e){ /* not found */ }
  } else {
    // Standalone mode (outside Claude) — use this browser's local storage instead
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ state = JSON.parse(raw); storageOk = true; return; }
    }catch(e){ /* not available or empty */ }
  }
  seedData();
  await saveState();
}
async function saveState(){
  const payload = JSON.stringify(state);

  if(typeof window.storage === 'undefined'){
    // Standalone mode (outside Claude) — save to this browser only
    try{
      localStorage.setItem(STORAGE_KEY, payload);
      storageOk = true;
      return true;
    }catch(e){
      storageOk = false;
      showToast('⚠ Not saved — export to Excel to be safe');
      return false;
    }
  }

  for(let attempt=1; attempt<=2; attempt++){
    try{
      const res = await window.storage.set(STORAGE_KEY, payload, false);
      if(res){ storageOk = true; return true; }
    }catch(e){
      console.error('save attempt '+attempt+' failed', e);
    }
    if(attempt===1) await new Promise(r=>setTimeout(r, 600));
  }
  storageOk = false;
  showToast('⚠ Not saved — export to Excel to be safe');
  return false;
}

/* ---------------- HELPERS ---------------- */
const money = n => (n<0?'-$':'$') + Math.abs(n).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
const fmtDate = d => { if(!d) return '—'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}); };
function jobById(id){ return state.jobs.find(j=>j.id===id); }
function jobExpenseTotal(jobId){ return state.expenses.filter(e=>e.jobId===jobId).reduce((s,e)=>s+e.cost,0); }
function jobHours(jobId){ return state.time.filter(t=>t.jobId===jobId).reduce((s,t)=>s+t.hours,0); }
function jobRevenue(job){
  if(!job) return 0;
  if(job.pricingType==='hourly') return jobHours(job.id) * (job.rate||0);
  return job.fixedPrice||0;
}
function jobInvoicedTotal(jobId){ return state.invoices.filter(i=>i.jobId===jobId).reduce((s,i)=>s+i.amount,0); }
function jobHasInvoice(jobId){ return state.invoices.some(i=>i.jobId===jobId); }
function jobInvoiceAmount(job){
  // Invoice total = job's labour/fixed value + materials/expenses on top (billed to client)
  return jobRevenue(job) + jobExpenseTotal(job.id);
}
function jobReceivedTotal(jobId){ return state.invoices.filter(i=>i.jobId===jobId).reduce((s,i)=>s+i.received,0); }
function jobProfit(job){ return jobRevenue(job) - jobExpenseTotal(job.id); }
function jobMargin(job){ const rev = jobRevenue(job); return rev>0 ? (jobProfit(job)/rev*100) : null; }
function nextJobNo(){ const n = state.jobs.length + 1; return 'J' + String(n).padStart(3,'0'); }
function statusClass(s){
  if(s==='Completed') return 'st-completed';
  if(s==='In Progress') return 'st-progress';
  if(s==='On Hold') return 'st-hold';
  return 'st-notstarted';
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }

/* ---------------- GOOGLE DRIVE INTEGRATION ---------------- */
let tokenClient = null;

function initGoogleDrive(){
  if(!state.googleClientId || typeof google === 'undefined' || !google.accounts) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: state.googleClientId,
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send',
    callback: async (resp)=>{
      if(resp.error){ showToast('Google sign-in failed'); return; }
      driveAccessToken = resp.access_token;
      driveConnected = true;
      showToast('Google Drive connected');
      await ensureDriveFolder();
      render();
    }
  });
}

function connectGoogleDrive(){
  if(!state.googleClientId){ showToast('Paste your Google Client ID first'); return; }
  if(!tokenClient) initGoogleDrive();
  if(tokenClient) tokenClient.requestAccessToken({prompt: driveConnected ? '' : 'consent'});
}

async function ensureDriveFolder(){
  if(state.driveFolderId) return state.driveFolderId;
  try{
    const q = encodeURIComponent(`name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
      headers: {'Authorization': `Bearer ${driveAccessToken}`}
    });
    const searchData = await searchRes.json();
    if(searchData.files && searchData.files.length){
      state.driveFolderId = searchData.files[0].id;
    } else {
      const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: {'Authorization': `Bearer ${driveAccessToken}`, 'Content-Type': 'application/json'},
        body: JSON.stringify({name: DRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder'})
      });
      const createData = await createRes.json();
      state.driveFolderId = createData.id;
    }
    await saveState();
    return state.driveFolderId;
  }catch(e){
    console.error('Drive folder error', e);
    return null;
  }
}

async function uploadInvoicePDFToDrive(blob, filename){
  if(!driveConnected || !driveAccessToken){ return false; }
  try{
    const folderId = await ensureDriveFolder();
    if(!folderId){ showToast('Could not find/create Drive folder'); return false; }
    const metadata = {name: filename, parents: [folderId], mimeType: 'application/pdf'};
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
    form.append('file', blob);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
      method: 'POST',
      headers: {'Authorization': `Bearer ${driveAccessToken}`},
      body: form
    });
    if(!res.ok){
      if(res.status===401){ driveConnected=false; showToast('Google session expired — reconnect Drive'); }
      else showToast('Drive upload failed — saved locally only');
      return false;
    }
    showToast('Saved to Drive → Invoices 26/27');
    return true;
  }catch(e){
    console.error('Drive upload error', e);
    showToast('Drive upload failed — saved locally only');
    return false;
  }
}

function blobToBase64(blob){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onloadend = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function sendInvoiceEmailToClient(invoice, pdfBlob, filename){
  if(!driveConnected || !driveAccessToken){ showToast('Connect Google above to send email'); return false; }
  if(!invoice.clientEmail){ return false; }
  try{
    const pdfBase64 = await blobToBase64(pdfBlob);
    const subject = `Invoice ${invoice.no} from G. Caporn Contracting`;
    const bodyText = `Hi ${invoice.client || ''},\r\n\r\nPlease find attached invoice ${invoice.no}, dated ${fmtDate(invoice.date)}, for ${money(invoice.amount)}.\r\n\r\nThanks,\r\nG. Caporn Contracting`;
    const boundary = 'invoice_' + Date.now();
    const mimeMessage =
      `To: ${invoice.clientEmail}\r\n` +
      `Subject: ${subject}\r\n` +
      `MIME-Version: 1.0\r\n` +
      `Content-Type: multipart/mixed; boundary="${boundary}"\r\n\r\n` +
      `--${boundary}\r\n` +
      `Content-Type: text/plain; charset="UTF-8"\r\n\r\n` +
      `${bodyText}\r\n\r\n` +
      `--${boundary}\r\n` +
      `Content-Type: application/pdf\r\n` +
      `Content-Transfer-Encoding: base64\r\n` +
      `Content-Disposition: attachment; filename="${filename}"\r\n\r\n` +
      `${pdfBase64}\r\n` +
      `--${boundary}--`;
    const raw = btoa(unescape(encodeURIComponent(mimeMessage))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: {'Authorization': `Bearer ${driveAccessToken}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({raw})
    });
    if(!res.ok){
      if(res.status===401){ driveConnected=false; showToast('Google session expired — reconnect above'); }
      else if(res.status===403){ showToast('Reconnect Google above — email sending needs a new permission'); }
      else showToast('Email failed to send — PDF was still saved');
      return false;
    }
    showToast(`Invoice emailed to ${invoice.clientEmail}`);
    return true;
  }catch(e){
    console.error('Gmail send error', e);
    showToast('Email failed to send — PDF was still saved');
    return false;
  }
}

function exportToExcel(){
  if(!window.XLSX){ showToast('Excel library failed to load'); return; }

  const jobRows = state.jobs.map(j=>{

    const exp = jobExpenseTotal(j.id);
    return {
      'Job No.': j.no,
      'Client': j.client,
      'Address': j.address || '',
      'Description': j.desc || '',

      'Status': j.status,
      'Pricing Type': j.pricingType==='hourly' ? 'Hourly' : 'Fixed',
      'Hourly Rate': j.pricingType==='hourly' ? (j.rate||0) : '',
      'Fixed Job Value': j.pricingType==='fixed' ? (j.fixedPrice||0) : '',
      'Hours Logged': jobHours(j.id),
      'Job Value ($)': rev,
      'Expenses ($)': exp,
      'Profit ($)': rev - exp,
      'Invoiced ($)': jobInvoicedTotal(j.id),
      'Received ($)': jobReceivedTotal(j.id)
    };
  });

  const expenseRows = state.expenses.map(e=>{
    const j = jobById(e.jobId);
    return {
      'Date': e.date,
      'Job No.': j ? j.no : 'Consumables',
      'Category': e.category,
      'Description': e.desc,
      'Supplier': e.supplier || '',
      'Cost ($)': e.cost
    };
  });

  const timeRows = state.time.map(t=>{
    const j = jobById(t.jobId);
    return {
      'Date': t.date,
      'Job No.': j ? j.no : '',
      'Started': t.start || '',
      'Finished': t.finish || '',
      'Hours': t.hours,
      'Description': t.desc || ''
    };
  });

  const invoiceRows = state.invoices.map(i=>{
    const j = jobById(i.jobId);
    return {
      'Invoice No.': i.no,
      'Job No.': j ? j.no : (i.jobNo||''),
      'Client': i.client,
      'Address': (j && j.address) || i.address || '',
      'Date': i.date,
      'Amount ($)': i.amount,
      'Received ($)': i.received,
      'Outstanding ($)': i.amount - i.received,
      'Status': (i.amount - i.received) <= 0.001 ? 'Paid' : 'Outstanding'
    };
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(jobRows), 'Job Register');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expenseRows), 'Expenses');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(timeRows), 'Time');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(invoiceRows), 'Invoices');

  const stamp = todayISO();
  XLSX.writeFile(wb, `GCaporn_Contracting_Tracker_${stamp}.xlsx`);
  showToast('Excel file downloaded');
}

function importFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (evt)=>{
    try{
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const jobSheet = wb.Sheets['Job Register'];
      const expSheet = wb.Sheets['Expenses'];
      const timeSheet = wb.Sheets['Time'];
      const invSheet = wb.Sheets['Invoices'];
      if(!jobSheet){ showToast('No "Job Register" sheet found'); return; }

      const jobRows = XLSX.utils.sheet_to_json(jobSheet);
      const expRows = expSheet ? XLSX.utils.sheet_to_json(expSheet) : [];
      const timeRows = timeSheet ? XLSX.utils.sheet_to_json(timeSheet) : [];
      const invRows = invSheet ? XLSX.utils.sheet_to_json(invSheet) : [];

      const noToId = {};
      const newJobs = jobRows.map((r,idx)=>{
        const id = idx+1;
        noToId[r['Job No.']] = id;
        const pricingType = (r['Pricing Type']||'Fixed').toLowerCase()==='hourly' ? 'hourly' : 'fixed';
        return {
          id, no: r['Job No.'] || ('J'+String(id).padStart(3,'0')),
          client: r['Client']||'', address: r['Address']||'', desc: r['Description']||'',
          started: r['Date Started']||'', status: r['Status']||'In Progress',
          pricingType, rate: parseFloat(r['Hourly Rate'])||0, fixedPrice: parseFloat(r['Fixed Job Value'])||0
        };
      });

      const newExpenses = expRows.map((r,idx)=>({
        id: idx+1, jobId: noToId[r['Job No.']] || null, date: r['Date']||'',
        category: r['Category']||'Other', desc: r['Description']||'', supplier: r['Supplier']||null,
        cost: parseFloat(r['Cost ($)'])||0
      }));

      const newTime = timeRows.map((r,idx)=>({
        id: idx+1, jobId: noToId[r['Job No.']] || null, date: r['Date']||'',
        start: r['Started']||'', finish: r['Finished']||'', hours: parseFloat(r['Hours'])||0, desc: r['Description']||''
      }));

      const newInvoices = invRows.map((r,idx)=>({
        id: idx+1, no: r['Invoice No.']||'', jobId: noToId[r['Job No.']] || null, jobNo: r['Job No.']||'',
        client: r['Client']||'', address: r['Address']||'', date: r['Date']||'',
        amount: parseFloat(r['Amount ($)'])||0, received: parseFloat(r['Received ($)'])||0
      }));

      state.jobs = newJobs;
      state.expenses = newExpenses;
      state.time = newTime;
      state.invoices = newInvoices;

      await saveState();
      currentTab = 'dashboard';
      render();
      showToast(`Imported ${newJobs.length} jobs from Excel`);
    }catch(err){
      console.error(err);
      showToast('Could not read that file');
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ---------------- PDF INVOICE GENERATION ---------------- */
function buildInvoiceDoc(invoice){
  if(!window.jspdf){ showToast('PDF library failed to load'); return null; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const pageWidth = doc.internal.pageSize.getWidth();
  const marginX = 48;
  let y = 56;

  // Header
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('G. CAPORN CONTRACTING', marginX, y);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('INVOICE', pageWidth - marginX, y, {align:'right'});
  y += 18;
  doc.setDrawColor(28,40,51); doc.setLineWidth(1.2);
  doc.line(marginX, y, pageWidth - marginX, y);
  y += 26;

  // Invoice meta
  doc.setFontSize(10); doc.setTextColor(90,90,90);
  doc.text('Invoice No.', marginX, y);
  doc.text('Date', pageWidth/2, y);
  y += 14;
  doc.setFontSize(13); doc.setTextColor(20,20,20); doc.setFont('helvetica','bold');
  doc.text(invoice.no, marginX, y);
  doc.setFont('helvetica','normal');
  doc.text(fmtDate(invoice.date), pageWidth/2, y);
  y += 30;

  // Bill to
  doc.setFontSize(10); doc.setTextColor(90,90,90); doc.text('BILL TO', marginX, y);
  y += 15;
  doc.setFontSize(12); doc.setTextColor(20,20,20); doc.setFont('helvetica','bold');
  doc.text(invoice.client || '', marginX, y);
  y += 15;
  doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
  if(invoice.address){ doc.text(invoice.address, marginX, y); y += 14; }
  y += 12;

  // Job description
  if(invoice.jobDesc){
    doc.setFontSize(10); doc.setTextColor(90,90,90); doc.setFont('helvetica','normal');
    doc.text('JOB DESCRIPTION', marginX, y);
    y += 15;
    doc.setFontSize(10.5); doc.setTextColor(20,20,20);
    const lines = doc.splitTextToSize(invoice.jobDesc, pageWidth - marginX*2);
    doc.text(lines, marginX, y);
    y += lines.length*13;
  }
  y += 16;

  // Line items table header
  doc.setFillColor(28,40,51);
  doc.rect(marginX, y, pageWidth-marginX*2, 22, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('DESCRIPTION', marginX+8, y+15);
  doc.text('AMOUNT', pageWidth-marginX-8, y+15, {align:'right'});
  y += 22;

  doc.setTextColor(20,20,20); doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
  const li = invoice.lineItems;
  const rowLine = (label, amount, indent)=>{
    doc.text(label, marginX+8+(indent||0), y+15, {maxWidth: pageWidth-marginX*2-100});
    doc.text(money(amount), pageWidth-marginX-8, y+15, {align:'right'});
    y += 20;
  };
  if(li){
    rowLine(li.labourLabel, li.labourAmount);
    if(li.expenses && li.expenses.length){
      y += 4;
      doc.setFont('helvetica','bold'); doc.text('Materials & expenses:', marginX+8, y+13); y += 16;
      doc.setFont('helvetica','normal');
      li.expenses.forEach(exp=>{
        const label = exp.desc + (exp.supplier ? ` (${exp.supplier})` : '');
        rowLine(label, exp.cost, 6);
      });
    }
  } else {
    rowLine('Job total', invoice.amount);
  }

  y += 6;
  doc.setDrawColor(200,200,200); doc.line(marginX, y, pageWidth-marginX, y);
  y += 22;
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text('TOTAL (no GST charged)', marginX+8, y);
  doc.text(money(invoice.amount), pageWidth-marginX-8, y, {align:'right'});
  y += 26;

  if(invoice.received > 0){
    doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
    doc.text(`Received: ${money(invoice.received)}`, marginX+8, y);
    y += 14;
    const bal = invoice.amount - invoice.received;
    if(bal > 0.01){ doc.text(`Balance due: ${money(bal)}`, marginX+8, y); y += 14; }
  }

  y += 30;
  doc.setFontSize(9); doc.setTextColor(120,120,120);
  doc.text('No GST is charged on this invoice.', marginX, y);

  return doc;
}

async function generateInvoicePDF(invoice){
  const doc = buildInvoiceDoc(invoice);
  if(!doc) return;
  const filename = `Invoice_${invoice.no}.pdf`;
  doc.save(filename);

  if(driveConnected){
    const blob = doc.output('blob');
    await uploadInvoicePDFToDrive(blob, filename);
    if(invoice.clientEmail){
      await sendInvoiceEmailToClient(invoice, blob, filename);
    }
  } else if(invoice.clientEmail){
    showToast('Connect Google above to email this invoice automatically');
  }
}

async function emailInvoiceNow(invoice){
  if(!invoice.clientEmail){ showToast('Enter a customer email first'); return; }
  if(!driveConnected){ showToast('Connect Google above to send email'); return; }
  const doc = buildInvoiceDoc(invoice);
  if(!doc) return;
  const filename = `Invoice_${invoice.no}.pdf`;
  const blob = doc.output('blob');
  await sendInvoiceEmailToClient(invoice, blob, filename);
}

/* ---------------- RENDER: TIME ---------------- */
function calcHours(start, finish){
  if(!start || !finish) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [fh,fm] = finish.split(':').map(Number);
  let mins = (fh*60+fm) - (sh*60+sm);
  if(mins < 0) mins += 24*60; // finished after midnight
  return +(mins/60).toFixed(2);
}

function render(){
  renderTabbar();
  const main = document.getElementById('main');
  if(currentTab==='dashboard') main.innerHTML = renderDashboard();
  else if(currentTab==='jobs') main.innerHTML = renderJobs();
  else if(currentTab==='expenses') main.innerHTML = renderExpenses();
  else if(currentTab==='invoices') main.innerHTML = renderInvoices();

  else if(currentTab==='newjob') main.innerHTML = renderNewJobForm();
  main.scrollTop = 0;

/* ---------------- ACTION HANDLERS ---------------- */
function attachActionHandlers(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    const evt = (el.tagName==='SELECT' || el.tagName==='INPUT') ? 'change' : 'click';
    el.addEventListener(evt, onAction);
  });
  const rateInput = document.getElementById('rate-input');
  if(rateInput){
    rateInput.addEventListener('change', async ()=>{
      state.rate = parseFloat(rateInput.value)||0;
      await saveState();
      render();
      showToast('Hourly rate updated');
    });
  }
  const timeStart = document.getElementById('time-start');
  const timeFinish = document.getElementById('time-finish');
  if(timeStart && timeFinish){
    const updatePreview = ()=>{
      const h = calcHours(timeStart.value, timeFinish.value);
      document.getElementById('time-hours-preview').textContent = `Hours worked: ${h.toFixed(2)}`;
    };
    timeStart.addEventListener('input', updatePreview);
    timeFinish.addEventListener('input', updatePreview);
  }
  const excelInput = document.getElementById('excel-file-input');
  if(excelInput){
    excelInput.addEventListener('change', ()=>{
      if(excelInput.files && excelInput.files[0]){
        importFromExcel(excelInput.files[0]);
      }
    });
  }
}

async function onAction(e){
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id ? parseInt(e.currentTarget.dataset.id) : null;
  const jobid = e.currentTarget.dataset.jobid ? parseInt(e.currentTarget.dataset.jobid) : null;

  if(action==='add-expense'){ currentTab='expenses'; expenseFormJobId = jobid; render(); if(jobid) document.getElementById('exp-job').value=jobid; }
  else if(action==='log-time'){ currentTab='time'; render(); if(jobid) document.getElementById('time-job').value=jobid; }
  else if(action==='new-invoice'){ currentTab='invoices'; if(jobid) invoiceFormJobId = jobid; render(); }
  else if(action==='new-job'){ currentTab='newjob'; render(); }

  else if(action==='export-excel'){ exportToExcel(); }

  else if(action==='save-google-client-id'){
    const val = document.getElementById('google-client-id').value.trim();
    if(!val){ showToast('Paste your Client ID first'); return; }
    state.googleClientId = val;
    await saveState();
    initGoogleDrive();
    render();
    showToast('Client ID saved — now tap Connect Google Drive');
  }

  else if(action==='connect-drive'){ connectGoogleDrive(); }

  else if(action==='reset-google-client-id'){
    state.googleClientId = '';
    state.driveFolderId = '';
    driveConnected = false;
    driveAccessToken = null;
    await saveState();
    render();
  }

  else if(action==='import-excel-trigger'){ document.getElementById('excel-file-input').click(); }

  else if(action==='select-invoice-job'){ invoiceFormJobId = parseInt(e.currentTarget.value); render(); }

  else if(action==='toggle-job'){ expandedJob = expandedJob===id ? null : id; confirmDeleteJobId=null; render(); }

  else if(action==='delete-job-prompt'){ confirmDeleteJobId = id; render(); }

  else if(action==='delete-job-cancel'){ confirmDeleteJobId = null; render(); }

  else if(action==='delete-job-execute'){
    const job = jobById(id);
    const orphanedExpenseCount = state.expenses.filter(e=>e.jobId===id).length;
    state.jobs = state.jobs.filter(j=>j.id!==id);
    // Materials/expenses are kept — just unlinked so they show as Consumables, not deleted
    state.expenses.forEach(e=>{ if(e.jobId===id){ e.jobId = null; e.orphanedFrom = job ? job.no : null; } });
    state.time = state.time.filter(t=>t.jobId!==id);
    state.invoices = state.invoices.filter(inv=>inv.jobId!==id);
    confirmDeleteJobId = null;
    expandedJob = null;
    await saveState();
    render();
    showToast(`${job ? job.no : 'Job'} deleted — ${orphanedExpenseCount} expense${orphanedExpenseCount===1?'':'s'} kept under Consumables`);
  }

  else if(action==='change-status'){
    const job = jobById(id);
    job.status = e.currentTarget.value;
    await saveState();
    if(job.status==='Completed' && !jobHasInvoice(job.id)){
      invoiceFormJobId = job.id;
      currentTab = 'invoices';
      expandedJob = null;
      render();
      showToast(`${job.no} completed — invoice ready below`);
      return;
    }
    showToast('Status updated');
    render();
  }

  else if(action==='change-pricing-type'){
    const job = jobById(id);
    job.pricingType = e.currentTarget.value;
    await saveState();
    render();
  }

  else if(action==='change-rate'){
    const job = jobById(id);
    job.rate = parseFloat(e.currentTarget.value)||0;
    await saveState();
    render();
  }

  else if(action==='change-fixed'){
    const job = jobById(id);
    job.fixedPrice = parseFloat(e.currentTarget.value)||0;
    await saveState();
    render();
  }

  else if(action==='toggle-newjob-pricing'){
    newJobPricingType = e.currentTarget.value;
    currentTab = 'newjob';
    render();
  }

  else if(action==='submit-expense'){
    const rawJobVal = document.getElementById('exp-job').value;
    const jobId = rawJobVal==='consumables' ? null : parseInt(rawJobVal);
    const date = document.getElementById('exp-date').value;
    const category = document.getElementById('exp-category').value;
    const desc = document.getElementById('exp-desc').value.trim();
    const supplier = document.getElementById('exp-supplier').value.trim();
    const amount = parseFloat(document.getElementById('exp-amount').value);
    if(!desc || !amount || amount<=0){ showToast('Add a description and amount'); return; }
    const newId = Math.max(0,...state.expenses.map(x=>x.id)) + 1;
    state.expenses.push({id:newId, jobId, date, category, desc, supplier: supplier||null, cost:amount});
    await saveState();
    showToast('Expense saved');
    render();
  }

  else if(action==='delete-expense'){
    state.expenses = state.expenses.filter(x=>x.id!==id);
    await saveState(); render(); showToast('Expense deleted');
  }

  else if(action==='submit-time'){
    const jobId = parseInt(document.getElementById('time-job').value);
    const date = document.getElementById('time-date').value;
    const start = document.getElementById('time-start').value;
    const finish = document.getElementById('time-finish').value;
    const desc = document.getElementById('time-desc').value.trim();
    const hours = calcHours(start, finish);
    if(!start || !finish || hours<=0){ showToast('Enter a start and finish time'); return; }
    const newId = Math.max(0,...state.time.map(x=>x.id)) + 1;
    state.time.push({id:newId, jobId, date, start, finish, hours, desc});
    await saveState();
    showToast(`Time logged — ${hours.toFixed(2)}h`);
    render();
  }

  else if(action==='delete-time'){
    state.time = state.time.filter(x=>x.id!==id);
    await saveState(); render(); showToast('Time entry deleted');
  }

  else if(action==='submit-invoice'){
    const jobId = parseInt(document.getElementById('inv-job').value);
    const no = document.getElementById('inv-no').value.trim();
    const date = document.getElementById('inv-date').value;
    const amount = parseFloat(document.getElementById('inv-amount').value);
    const clientEmail = document.getElementById('inv-email').value.trim();
    if(!amount || amount<=0){ showToast('Enter an amount'); return; }
    const job = jobById(jobId);
    const newId = Math.max(0,...state.invoices.map(x=>x.id)) + 1;
    // Snapshot line items at time of creation so the PDF stays accurate even if expenses change later
    const lineItems = {
      labourLabel: job.pricingType==='hourly' ? `Labour — ${jobHours(job.id).toFixed(1)} hrs @ ${money(job.rate||0)}/hr` : 'Job amount (fixed price)',
      labourAmount: jobRevenue(job),
      expenses: state.expenses.filter(e=>e.jobId===job.id).map(e=>({desc:e.desc, supplier:e.supplier, cost:e.cost}))
    };
    const invoice = {id:newId, no, jobId, jobNo:job.no, client:job.client, address:job.address, jobDesc:job.desc, date, amount, received:0, lineItems, clientEmail: clientEmail || null};
    state.invoices.push(invoice);
    invoiceFormJobId = null;
    await saveState();
    showToast('Invoice created');
    render();
    await generateInvoicePDF(invoice);
  }

  else if(action==='download-pdf'){
    const inv = state.invoices.find(x=>x.id===id);
    await generateInvoicePDF(inv);
  }

  else if(action==='email-invoice'){
    const inv = state.invoices.find(x=>x.id===id);
    const emailInput = document.getElementById(`inv-email-${id}`);
    const emailVal = emailInput ? emailInput.value.trim() : '';
    if(!emailVal){ showToast('Enter a customer email first'); return; }
    inv.clientEmail = emailVal;
    await saveState();
    await emailInvoiceNow(inv);
    render();
  }

  else if(action==='mark-paid'){
    const inv = state.invoices.find(x=>x.id===id);
    inv.received = inv.amount;
    await saveState(); render(); showToast('Payment recorded');
  }

  else if(action==='delete-invoice'){
    state.invoices = state.invoices.filter(x=>x.id!==id);
    await saveState(); render(); showToast('Invoice deleted');
  }

  else if(action==='submit-newjob'){
    const client = document.getElementById('nj-client').value.trim();
    const address = document.getElementById('nj-address').value.trim();
    const desc = document.getElementById('nj-desc').value.trim();
    const started = document.getElementById('nj-date').value;
    const status = document.getElementById('nj-status').value;
    const pricingType = document.getElementById('nj-pricing-type').value;
    const rateEl = document.getElementById('nj-rate');
    const fixedEl = document.getElementById('nj-fixed');
    const rate = rateEl ? (parseFloat(rateEl.value)||0) : 0;
    const fixedPrice = fixedEl ? (parseFloat(fixedEl.value)||0) : 0;
    if(!client){ showToast('Enter a client name'); return; }
    const newId = Math.max(0,...state.jobs.map(x=>x.id)) + 1;
    const no = nextJobNo();
    state.jobs.push({id:newId, no, client, address, desc, started, status, pricingType, rate, fixedPrice});
    await saveState();
    newJobPricingType = 'fixed';
    currentTab = 'jobs';
    showToast(`${no} created`);
    render();
  }
}

/* ---------------- INIT ---------------- */
(async function init(){
  await loadState();
  render();
  if(state.googleClientId){
    // Wait for the Google script to finish loading before initializing
    const waitForGoogle = setInterval(()=>{
      if(typeof google !== 'undefined' && google.accounts){
        clearInterval(waitForGoogle);
        initGoogleDrive();
      }
    }, 200);
  }
})();
</script>
</body>
